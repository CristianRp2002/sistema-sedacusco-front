<div>
  <label class="block text-xs font-bold mb-1.5" style="color: #475569;">
    {{ label }}
    <span *ngIf="opcional" class="font-normal" style="color: #94a3b8;">(opcional)</span>
  </label>
  <input
    [type]="type"
    [placeholder]="placeholder"
    [value]="valor"
    (input)="onInput($event)"
    (focus)="isFocused = true"
    (blur)="isFocused = false; onTouched()"
    class="w-full px-4 py-2.5 rounded-xl border text-sm outline-none transition-all"
    [style.border-color]="isFocused ? '#0072BC' : '#e2e8f0'"
    style="color: #1e293b;">
</div>
