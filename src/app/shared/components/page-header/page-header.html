<div class="flex items-start justify-between">
  <div>
    <p class="text-xs font-bold uppercase tracking-widest mb-1" style="color: #29ABE2; letter-spacing: 0.15em;">
      {{ seccion }}
    </p>
    <h3 class="text-3xl font-black" style="color: #001F4E;">{{ titulo }}</h3>
    <p class="text-sm mt-1" style="color: #94a3b8;">{{ subtitulo }}</p>
  </div>
  <button *ngIf="botonTexto" (click)="botonClick.emit()"
    class="flex items-center gap-2 text-sm px-5 py-2.5 rounded-xl font-bold text-white transition-all hover:opacity-90 hover:shadow-lg"
    style="background: linear-gradient(135deg, #0072BC, #29ABE2); box-shadow: 0 4px 12px rgba(0,114,188,0.3);">
    <span class="material-icons" style="font-size: 18px;">{{ botonIcono }}</span>
    {{ botonTexto }}
  </button>
</div>
